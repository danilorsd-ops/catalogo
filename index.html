<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmácia dos Pobres - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --farm-red: #e11d48; --farm-blue: #1e40af; }
        .bg-farm-blue { background-color: var(--farm-blue); }
        .text-farm-blue { color: var(--farm-blue); }
        .bg-farm-red { background-color: var(--farm-red); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <header class="bg-farm-blue text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="logo.jpg" alt="Logo" class="h-12 w-auto">
                    <div>
                        <h1 class="text-lg font-black leading-tight">Farmácia dos Pobres</h1>
                        <p class="text-[10px] italic opacity-80">O lugar certo para sua Saúde</p>
                    </div>
                </div>
                <button onclick="toggleCart()" class="relative bg-farm-red p-2 rounded-full px-4 flex items-center gap-2">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="font-bold">0</span>
                </button>
            </div>
            <div class="relative text-gray-800">
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="Pesquisar entre 6.000+ produtos..." 
                       class="w-full p-3 rounded-lg shadow-inner outline-none focus:ring-2 focus:ring-farm-red">
                <i class="fas fa-search absolute right-4 top-4 text-gray-400"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div id="loading" class="text-center py-10 font-bold text-gray-500">
            <i class="fas fa-spinner fa-spin"></i> Carregando estoque atualizado...
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div id="no-results" class="hidden text-center py-20 text-gray-500">
            Nenhum produto encontrado.
        </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 bg-black/50 z-[60] hidden">
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white flex flex-col shadow-2xl">
            <div class="p-6 bg-farm-blue text-white flex justify-between items-center">
                <h2 class="font-bold">MEU PEDIDO</h2>
                <button onclick="toggleCart()" class="text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
            <div class="p-6 border-t bg-gray-50 space-y-4">
                <div class="flex justify-between text-xl font-bold text-farm-blue">
                    <span>TOTAL:</span><span id="total-price">R$ 0,00</span>
                </div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full p-2 border rounded">
                <input type="text" id="cust-address" placeholder="Endereço de Entrega" class="w-full p-2 border rounded">
                <select id="payment-method" class="w-full p-2 border rounded">
                    <option value="Pix">Pix</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                </select>
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">
                    FINALIZAR NO WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'estoque.csv'; // Nome do seu arquivo no GitHub
        const WHATSAPP_NUMBER = "5583996901718";
        let allProducts = [];
        let cart = [];

        // 1. FUNÇÃO PARA BUSCAR E LER O CSV
        function loadInventory() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    // 2. LIMPEZA DOS DADOS DO ERP
                    allProducts = results.data.map(row => {
                        return {
                            code: row['Codigo'] ? row['Codigo'].trim() : '',
                            name: row['produto'] ? row['produto'].trim() : 'Produto sem nome',
                            price: row['Vlr Unit.'] ? parseFloat(row['Vlr Unit.'].replace(',', '.')) : 0,
                            stock: row['QTD.'] ? parseInt(row['QTD.']) : 0
                        };
                    }).filter(p => p.stock > 0 && p.name !== 'Produto sem nome'); // Só mostra o que tem estoque

                    document.getElementById('loading').classList.add('hidden');
                    renderProducts(allProducts);
                },
                error: function(err) {
                    console.error("Erro ao carregar CSV:", err);
                    document.getElementById('loading').innerHTML = "Erro ao carregar estoque. Verifique o arquivo estoque.csv.";
                }
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            const noRes = document.getElementById('no-results');
            grid.innerHTML = '';
            
            if(list.length === 0) {
                noRes.classList.remove('hidden');
                return;
            }
            
            noRes.classList.add('hidden');
            // Mostra apenas os primeiros 100 resultados para manter o site rápido
            const displayLimit = list.slice(0, 100);

            grid.innerHTML = displayLimit.map((p) => `
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex flex-col justify-between hover:border-farm-blue transition-all">
                    <img src="produto.jpg" class="w-full h-24 object-contain mb-2 opacity-80">
                    <div>
                        <p class="text-[9px] text-gray-400 font-bold">REF: ${p.code}</p>
                        <h3 class="text-[11px] font-bold text-gray-700 leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                        <p class="text-farm-blue font-black text-sm mb-2">R$ ${p.price.toLocaleString('pt-br', {minimumFractionDigits: 2})}</p>
                    </div>
                    <button onclick="addToCart('${p.code}')" class="w-full bg-farm-red text-white text-[10px] py-2 rounded font-bold uppercase active:scale-95 transition-all">
                        Adicionar
                    </button>
                </div>
            `).join('');
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(term) || p.code.includes(term)
            );
            renderProducts(filtered);
        }

        function addToCart(code) {
            const product = allProducts.find(p => p.code === code);
            const existing = cart.find(item => item.code === code);
            if (existing) { existing.qty += 1; } else { cart.push({ ...product, qty: 1 }); }
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.reduce((acc, item) => acc + item.qty, 0);
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded text-xs border">
                    <div class="flex-1">
                        <p class="font-bold text-gray-800">${item.name}</p>
                        <p class="text-gray-500">${item.qty}x R$ ${item.price.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <button onclick="removeItem(${i})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            document.getElementById('total-price').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function removeItem(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const pay = document.getElementById('payment-method').value;
            if(!name || !addr || cart.length === 0) return alert("Por favor, preencha nome e endereço!");

            let msg = `*NOVO PEDIDO - FARMÁCIA DOS POBRES*\n\n`;
            msg += `👤 *Cliente:* ${name}\n📍 *Endereço:* ${addr}\n💳 *Pagamento:* ${pay}\n\n*ITENS:*\n`;
            cart.forEach(item => {
                msg += `- ${item.qty}x ${item.name} [REF: ${item.code}]\n`;
            });
            const total = cart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            msg += `\n*TOTAL: R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Inicia o carregamento quando a página abre
        window.onload = loadInventory;
    </script>
</body>
</html>
