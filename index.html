<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmácia dos Pobres - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts do Carrossel (Swiper) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
        :root { --farm-red: #e11d48; --farm-blue: #1e40af; }
        .bg-farm-blue { background-color: var(--farm-blue); }
        .text-farm-blue { color: var(--farm-blue); }
        .bg-farm-red { background-color: var(--farm-red); }

        /* Estilo customizado para o Carrossel */
        .swiper { width: 100%; height: auto; border-radius: 12px; margin-top: 10px; }
        .swiper-slide img { 
            width: 100%; 
            height: auto; 
            object-fit: cover; 
            aspect-ratio: 16 / 7; /* Formato ideal de banner */
            display: block;
        }
        /* Cor das bolinhas do carrossel */
        .swiper-pagination-bullet-active { background: var(--farm-red) !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <header class="bg-farm-blue text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img src="logo.jpg" alt="Logo" class="h-12 w-auto">
                    <div>
                        <h1 class="text-lg font-black leading-tight">Farmácia dos Pobres</h1>
                        <p class="text-[10px] italic opacity-80">O lugar certo para sua Saúde</p>
                    </div>
                </div>
                <button onclick="toggleCart()" class="relative bg-farm-red p-2 rounded-full px-4 flex items-center gap-2 transition-transform active:scale-95">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="font-bold">0</span>
                </button>
            </div>
            <div class="relative text-gray-800">
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="Pesquisar entre 6.000+ produtos..." 
                       class="w-full p-3 rounded-lg shadow-inner outline-none focus:ring-2 focus:ring-farm-red">
                <i class="fas fa-search absolute right-4 top-4 text-gray-400"></i>
            </div>
        </div>
    </header>

    <!-- FRASE DE FRETE GRÁTIS -->
    <div class="bg-yellow-100 text-yellow-800 text-center py-2 text-sm font-bold border-b border-yellow-200">
        🚀 Entrega grátis em pedidos a partir de R$ 20,00!
    </div>

    <!-- CARROSSEL DE BANNERS (INSERIDO AQUI) -->
    <div class="container mx-auto px-4">
        <div class="swiper mySwiper shadow-md">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="banner1.jpg" alt="Promoção 1"></div>
                <div class="swiper-slide"><img src="banner2.jpg" alt="Promoção 2"></div>
                <div class="swiper-slide"><img src="banner3.jpg" alt="Promoção 3"></div>
            </div>
            <!-- Bolinhas de navegação -->
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-6">
        <div id="loading" class="text-center py-10 font-bold text-gray-500">
            <i class="fas fa-spinner fa-spin"></i> Carregando estoque atualizado...
        </div>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div id="no-results" class="hidden text-center py-20 text-gray-500">
            Nenhum produto encontrado.
        </div>
    </main>

    <!-- O RESTANTE DO SEU CÓDIGO (CARRINHO E SIDEBAR) PERMANECE O MESMO -->
    <div id="cart-sidebar" class="fixed inset-0 bg-black/50 z-[60] hidden">
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white flex flex-col shadow-2xl">
            <div class="p-6 bg-farm-blue text-white flex justify-between items-center">
                <h2 class="font-bold uppercase tracking-widest">Meu Pedido</h2>
                <button onclick="toggleCart()" class="text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
            <div class="p-6 border-t bg-gray-50 space-y-4">
                <div class="space-y-1 text-sm border-b pb-3">
                    <div class="flex justify-between text-gray-600"><span>Subtotal:</span><span id="subtotal">R$ 0,00</span></div>
                    <div class="flex justify-between text-gray-600"><span>Taxa de Entrega:</span><span id="delivery-fee">R$ 0,00</span></div>
                    <div class="flex justify-between text-xl font-black text-farm-blue pt-2"><span>TOTAL:</span><span id="total-price">R$ 0,00</span></div>
                </div>
                <div class="space-y-2">
                    <input type="text" id="cust-name" placeholder="Seu Nome Completo" class="w-full p-2 border rounded outline-none focus:border-farm-blue">
                    <input type="text" id="cust-address" placeholder="Endereço de Entrega" class="w-full p-2 border rounded outline-none focus:border-farm-blue">
                    <input type="text" id="cust-obs" placeholder="Observação (Troco, ponto de referência...)" class="w-full p-2 border rounded outline-none focus:border-farm-blue">
                    <select id="payment-method" class="w-full p-2 border rounded bg-white outline-none focus:border-farm-blue">
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Link de Pagamento">Link de Pagamento</option>
                    </select>
                    <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                        <i class="fab fa-whatsapp text-xl"></i> FINALIZAR NO WHATSAPP
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicialização do Carrossel (Swiper)
        const swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });

        const CSV_URL = 'estoque.csv'; 
        const WHATSAPP_NUMBER = "5583996901718";
        let allProducts = [];
        let cart = [];

        function loadInventory() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    allProducts = results.data.map(row => {
                        const getVal = (name) => {
                            const key = Object.keys(row).find(k => k.trim().includes(name));
                            return key ? row[key] : null;
                        };
                        const rawPrice = getVal('Vlr Unit.') || "0";
                        const rawStock = getVal('QTD.') || "0";

                        return {
                            code: (getVal('Codigo') || "").trim(),
                            name: (getVal('produto') || "Sem nome").trim(),
                            price: parseFloat(rawPrice.toString().replace(',', '.')),
                            stock: parseInt(rawStock)
                        };
                    }).filter(p => p.stock > 0 && p.name !== "Sem nome");

                    document.getElementById('loading').classList.add('hidden');
                    renderProducts(allProducts);
                }
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            const noRes = document.getElementById('no-results');
            grid.innerHTML = '';
            if(list.length === 0) { noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');
            const displayLimit = list.slice(0, 100);
            grid.innerHTML = displayLimit.map((p) => `
                <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 flex flex-col justify-between hover:border-farm-blue transition-all">
                    <img src="produto.jpg" class="w-full h-24 object-contain mb-2 opacity-80">
                    <div>
                        <p class="text-[9px] text-gray-400 font-bold">REF: ${p.code}</p>
                        <h3 class="text-[11px] font-bold text-gray-700 leading-tight mb-2 h-8 overflow-hidden">${p.name}</h3>
                        <p class="text-farm-blue font-black text-sm mb-2">R$ ${p.price.toLocaleString('pt-br', {minimumFractionDigits: 2})}</p>
                    </div>
                    <button onclick="addToCart('${p.code}')" class="w-full bg-farm-red text-white text-[10px] py-2 rounded font-bold uppercase active:scale-95 transition-all">
                        Adicionar
                    </button>
                </div>
            `).join('');
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term) || p.code.includes(term));
            renderProducts(filtered);
        }

        function addToCart(code) {
            const product = allProducts.find(p => p.code === code);
            if (!product) return;
            const existing = cart.find(item => item.code === code);
            if (existing) { existing.qty += 1; } else { cart.push({ ...product, qty: 1 }); }
            updateCart();
            const cartBtn = document.querySelector('button[onclick="toggleCart()"]');
            cartBtn.classList.add('scale-110');
            setTimeout(() => cartBtn.classList.remove('scale-110'), 200);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.reduce((acc, item) => acc + item.qty, 0);
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">Carrinho vazio</p>';
            } else {
                container.innerHTML = cart.map((item, i) => `
                    <div class="flex justify-between items-center bg-gray-50 p-2 rounded text-xs border">
                        <div class="flex-1">
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <p class="text-gray-500">${item.qty}x R$ ${item.price.toLocaleString('pt-br', {minimumFractionDigits: 2})}</p>
                        </div>
                        <button onclick="removeItem(${i})" class="text-red-500 p-2 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </div>
                `).join('');
            }
            calculateTotals();
        }

        function calculateTotals() {
            const subtotal = cart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            const deliveryFee = (subtotal > 0 && subtotal < 20) ? 2.00 : 0.00;
            const total = subtotal + deliveryFee;
            document.getElementById('subtotal').innerText = `R$ ${subtotal.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            document.getElementById('delivery-fee').innerText = deliveryFee === 0 ? "GRÁTIS" : `R$ ${deliveryFee.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            document.getElementById('total-price').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function removeItem(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('hidden'); }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const pay = document.getElementById('payment-method').value;
            const obs = document.getElementById('cust-obs').value;
            if(!name || !addr || cart.length === 0) return alert("Por favor, preencha nome e endereço!");
            const subtotal = cart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            const deliveryFee = (subtotal >= 20) ? 0 : 2;
            const total = subtotal + deliveryFee;
            let msg = `*NOVO PEDIDO - FARMÁCIA DOS POBRES*\n\n`;
            msg += `👤 *Cliente:* ${name}\n📍 *Endereço:* ${addr}\n`;
            if(obs) { msg += `📝 *Obs:* ${obs}\n`; }
            msg += `💳 *Pagamento:* ${pay}\n\n*ITENS:*\n`;
            cart.forEach(item => {
                msg += `- ${item.qty}x ${item.name} [REF: ${item.code}] (R$ ${(item.qty * item.price).toLocaleString('pt-br', {minimumFractionDigits: 2})})\n`;
            });
            msg += `\n-------------------\n`;
            msg += `*Subtotal:* R$ ${subtotal.toLocaleString('pt-br', {minimumFractionDigits: 2})}\n`;
            msg += `*Entrega:* ${deliveryFee === 0 ? "GRÁTIS" : "R$ 2,00"}\n`;
            msg += `*TOTAL FINAL: R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
